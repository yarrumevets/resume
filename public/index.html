<html>
  <head>
    <meta property="og:title" content="Steve Murray Resume" />
    <meta
      property="og:image"
      content="https://docs.google.com/document/d/1SHR8qJS1WD-WRUdDL8ziegQ_M_DLwmFx1Ps6I847Rc4/preview"
    />
    <meta property="og:description" content="Steve Murray's Resume" />

    <meta property="og:url" content="http://www.yarrumevets.com/resume" />
    <title>yarrumevets.com | resume</title>
    <link
      rel="stylesheet"
      href="https://use.fontawesome.com/releases/v5.8.1/css/all.css"
      integrity="sha384-50oBUHEmvpQ+1lW4y57PTFmhCaXp0ML5d60M1M7uH2+nqUivzIebhndOJK28anvf"
      crossorigin="anonymous"
    />

    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="resume.js"></script>
  </head>
  <body>
    <header>
      <h1 class="title web-only">Steve Murray's Resume</h1>
    </header>
    <div class="main-wrapper" id="main-wrapper">
      <div id="resume-content">Loading from Google Drive API...</div>
      <nav class="file-format-links web-only">
        <a hovertext="Email Me" href="#" id="email-button"
          ><i class="far fa-envelope"></i> Email Resume</a
        >
        <div>
          <a
            hovertext="Download pdf version"
            href="https://docs.google.com/document/export?format=pdf&id=1SHR8qJS1WD-WRUdDL8ziegQ_M_DLwmFx1Ps6I847Rc4"
            ><i class="far fa-file-pdf"></i> .pdf
          </a>
          <span class="divider">|</span>
          <a
            hovertext="Download docx version"
            href="https://docs.google.com/document/export?format=doc&id=1SHR8qJS1WD-WRUdDL8ziegQ_M_DLwmFx1Ps6I847Rc4"
            download
            ><i class="far fa-file-word"></i> .docx</a
          >
          <span class="divider">|</span>
          <a hovertext="Download rich text version" href="/resume/rtf" download
            ><i class="far fa-file-alt"></i> .rtf</a
          >
          <span class="divider">|</span>
          <a hovertext="Download plain text version" href="/resume/txt" download
            ><i class="far fa-file-alt"></i> .txt</a
          >
        </div>
        <div>
          <a
            hovertext="Google Docs Preview"
            href="https://docs.google.com/document/d/1SHR8qJS1WD-WRUdDL8ziegQ_M_DLwmFx1Ps6I847Rc4/preview"
            ><i class="fab fa-google-plus"></i> Google Drive</a
          >
        </div>
        <a hovertext="Print Me" href="#" id="print-button"
          ><i class="fas fa-print"></i> Print</a
        >
        <a
          hovertext="Resume App on GitHub"
          href="https://github.com/yarrumevets/resume"
          ><i class="fab fa-github"></i> Git</a
        >
      </nav>
      <div id="email-form">
        <form>
          <input
            type="text"
            id="email-address"
            placeholder="johndoe@gmail.com"
          />
          <button id="send-email-button">
            Send <i class="far fa-envelope"></i>
          </button>
        </form>
      </div>
    </div>

    <footer class="web-only">
      <nav class="web-only">
        <ul class="social-links">
          <li>
            <a hovertext="www.yarrumevets.com" href="http://www.yarrumevets.com"
              ><i class="fas fa-globe"></i> Website</a
            >
          </li>
          <li>
            <a
              hovertext="linkedin.com/in/yarrumevets"
              href="http://www.linkedin.com/in/yarrumevets"
              ><i class="fab fa-linkedin"></i> LinkedIn</a
            >
          </li>
          <li>
            <a
              hovertext="github.com/yarrumevets"
              href="http://www.github.com/yarrumevets"
              ><i class="fab fa-github"></i> GitHub</a
            >
          </li>
          <li>
            <a
              hovertext="https://stackoverflow.com/users/story/1631670"
              href="https://stackoverflow.com/users/story/1631670"
              ><i class="fab fa-stack-overflow"></i> StackOverflow</a
            >
          </li>
        </ul>
      </nav>
    </footer>
  </body>
</html>
